name: Zig CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    env:
      ZIG_VERSION: 0.13.0
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            run_tests: true
          - os: ubuntu-latest
            target: aarch64-linux
            run_tests: false
          - os: macos-latest
            target: aarch64-macos
            run_tests: true
          - os: macos-latest
            target: x86_64-macos
            run_tests: false
          - os: windows-latest
            target: x86_64-windows
            run_tests: true
          - os: windows-latest
            target: aarch64-windows
            run_tests: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Java
        if: matrix.run_tests
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Clojure
        if: matrix.run_tests
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Install Zig (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64) archive="zig-linux-x86_64-${ZIG_VERSION}.tar.xz" ;;
            macOS-ARM64) archive="zig-macos-aarch64-${ZIG_VERSION}.tar.xz" ;;
            *)
              echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}" >&2
              exit 1
              ;;
          esac
          curl -L --fail --output "$archive" "https://ziglang.org/download/${ZIG_VERSION}/$archive"
          tar -xf "$archive"
          echo "$PWD/${archive%.tar.xz}" >> "$GITHUB_PATH"
      - name: Install Zig (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = switch ("${{ runner.arch }}") {
            'X64' { "zig-windows-x86_64-$env:ZIG_VERSION.zip" }
            default { throw "unsupported runner: ${{ runner.os }}-${{ runner.arch }}" }
          }
          Invoke-WebRequest -Uri "https://ziglang.org/download/$env:ZIG_VERSION/$archive" -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath . -Force
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $PWD ($archive -replace '\.zip$', ''))
      - name: Compile tests
        run: zig build test-compile -Dtarget=${{ matrix.target }}
      - name: Build test binary
        if: matrix.run_tests
        run: zig build -Dtarget=${{ matrix.target }}
      - name: Run unit tests
        if: matrix.run_tests
        run: zig test src/main.zig -Dtarget=${{ matrix.target }}
      - name: Run integration tests (start)
        if: matrix.run_tests
        env:
          SHLICE_TEST_EXE: ${{ matrix.target == 'x86_64-windows' && 'zig-out/bin/shlice.exe' || 'zig-out/bin/shlice' }}
        run: zig test src/integration_test.zig -Dtarget=${{ matrix.target }} --test-filter "start osc repl, exec twice, stop"
      - name: Run integration tests (timeout)
        if: matrix.run_tests
        env:
          SHLICE_TEST_EXE: ${{ matrix.target == 'x86_64-windows' && 'zig-out/bin/shlice.exe' || 'zig-out/bin/shlice' }}
        run: zig test src/integration_test.zig -Dtarget=${{ matrix.target }} --test-filter "exec incomplete command times out and shell recovers"
      - name: Run integration tests (serialized)
        if: matrix.run_tests
        env:
          SHLICE_TEST_EXE: ${{ matrix.target == 'x86_64-windows' && 'zig-out/bin/shlice.exe' || 'zig-out/bin/shlice' }}
        run: zig test src/integration_test.zig -Dtarget=${{ matrix.target }} --test-filter "exec requests are serialized"
      - name: Run integration tests (contention)
        if: matrix.run_tests
        env:
          SHLICE_TEST_EXE: ${{ matrix.target == 'x86_64-windows' && 'zig-out/bin/shlice.exe' || 'zig-out/bin/shlice' }}
        run: zig test src/integration_test.zig -Dtarget=${{ matrix.target }} --test-filter "exec requests stay serialized under contention"
      - name: Run integration tests (stop)
        if: matrix.run_tests
        env:
          SHLICE_TEST_EXE: ${{ matrix.target == 'x86_64-windows' && 'zig-out/bin/shlice.exe' || 'zig-out/bin/shlice' }}
        run: zig test src/integration_test.zig -Dtarget=${{ matrix.target }} --test-filter "stop rejects queued exec"
      - name: Run integration tests (missing shell)
        if: matrix.run_tests
        env:
          SHLICE_TEST_EXE: ${{ matrix.target == 'x86_64-windows' && 'zig-out/bin/shlice.exe' || 'zig-out/bin/shlice' }}
        run: zig test src/integration_test.zig -Dtarget=${{ matrix.target }} --test-filter "start fails fast on missing shell command"
      - name: Build release binary
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall
      - name: Upload release binary
        uses: actions/upload-artifact@v7
        with:
          name: shlice-${{ matrix.target }}
          path: zig-out/bin/*
